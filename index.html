<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Pune Urban Growth Dashboard</title>
    
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Leaflet Swipe plugin -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-swipe@1.0.3/dist/leaflet-swipe.css"/>
    <script src="https://unpkg.com/leaflet-swipe@1.0.3/dist/leaflet-swipe.js"></script>

    <!-- Google Charts -->
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

    <!-- GEE API -->
    <script src="https://cdn.jsdelivr.net/npm/earthengine-api@0.1.321/ee_api_js_latest.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Pune Urban Growth Dashboard</h2>

    <div class="controls">
        <label for="yearSelect">Select Year:</label>
        <select id="yearSelect">
            <option value="1990">1990</option>
            <option value="2000">2000</option>
            <option value="2019">2019</option>
            <option value="2025">2025</option>
        </select>

        <button id="compareBtn">Compare 1990 vs 2025</button>
        <button id="swipeBtn">Swipe 1990 vs 2025</button>
    </div>

    <div id="areaLabel">Urban Area: </div>
    
    <div id="map" style="width: 100%; height: 500px;"></div>
    <div id="chart_div" style="width: 100%; height: 400px;"></div>

    <script src="main.js"></script>
</body>
</html>
